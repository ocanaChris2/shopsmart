services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Web Service — Fastify API + pg-boss Worker (PM2-managed, 512 MB)
  # ─────────────────────────────────────────────────────────────────────────────
  - type:    web
    name:    shopsmart-api
    runtime: node
    plan:    free
    region:  ohio

    buildCommand: npm install && npm run build
    startCommand: npm start

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key:   NODE_ENV
        value: production

      - key:   LOG_LEVEL
        value: info

      # Supabase Session Pooler — port 6543, IPv4-compatible (Render free tier)
      # Format: postgresql://postgres.[REF]:[PWD]@aws-0-[REGION].pooler.supabase.com:6543/postgres
      - key:  DATABASE_URL
        sync: false

      - key:  JWT_SECRET
        sync: false

      - key:   JWT_EXPIRES_IN
        value: 24h

      - key:   DB_POOL_MAX
        value: "5"

      - key:   RATE_LIMIT_MAX
        value: "100"

      - key:   RATE_LIMIT_WINDOW_MS
        value: "60000"

      - key:   AUTH_RATE_LIMIT_MAX
        value: "10"

      - key:   JOB_POLL_INTERVAL_SECONDS
        value: "5"

      - key:   STORAGE_BASE_URL
        value: https://storage.example.com/exports

      # Optional — only needed if you set up Cloudflare cache purge.
      # Leave blank or omit; empty string is handled safely by the app.
      - key:   CF_ZONE_ID
        value: ""

      - key:   CF_API_TOKEN
        value: ""

      - key:   API_BASE_URL
        value: ""

  # ─────────────────────────────────────────────────────────────────────────────
  # Static Site — React / Vite SPA
  # ─────────────────────────────────────────────────────────────────────────────
  - type: static
    name: shopsmart-frontend
    plan: free

    buildCommand:      cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    autoDeploy: true

    routes:
      - type:        rewrite
        source:      /*
        destination: /index.html

    headers:
      - path: /*
        name:  X-Frame-Options
        value: DENY
      - path: /*
        name:  X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name:  Cache-Control
        value: public, max-age=31536000, immutable

    envVars:
      - key:  VITE_API_BASE_URL
        sync: false

      - key:   VITE_APP_NAME
        value: ShopSmart ERP
